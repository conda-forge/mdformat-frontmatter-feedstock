schema_version: 1

context:
  name: mdformat-frontmatter
  version: 2.0.10

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mdformat_frontmatter-${{ version }}.tar.gz
  sha256: decefcb4beb66cf111f17e8c0d82e60b208104c7922ec09564d05365db551bd8

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - mdformat >=0.7.16
    - mdit-py-plugins >=0.4.0
    - ruamel.yaml

tests:
  - python:
      imports:
        - mdformat_frontmatter
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: An mdformat plugin for parsing / ignoring frontmatter.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/butler54/mdformat-frontmatter
  repository: https://github.com/butler54/mdformat-frontmatter

extra:
  recipe-maintainers:
    - xylar
